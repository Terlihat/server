<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#3b82f6">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <title>SKYNET</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <header>
        <div class="brand"><i class="fa-solid fa-bolt"></i> SKYNET v1.7</div>
        <div class="header-actions">
            <button id="update-btn" style="display: none; background: var(--primary-dark); color: white; border: none; padding: 6px 12px; border-radius: 8px; font-weight: 600; font-size: 0.85rem; cursor: pointer; margin-right: 5px;"><i class="fa-solid fa-arrows-rotate"></i> Update App</button>
            <button id="install-btn"><i class="fa-solid fa-download"></i> Install App</button>
            <button class="theme-btn" id="theme-toggle"><i class="fa-solid fa-moon"></i></button>
        </div>
    </header>

    <div class="container">
        <!-- AREA 1: KONEKSI -->
        <div id="connection-area">
            <div class="card">
                <h3>ID Perangkat Anda</h3>
                <div class="id-display" id="my-id">Memuat... <i class="fa-solid fa-circle-notch fa-spin"></i></div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="copyInviteLink()"><i class="fa-solid fa-link"></i> Salin Link</button>
                    <button class="btn btn-outline" onclick="toggleQR()"><i class="fa-solid fa-qrcode"></i> QR Code</button>
                </div>
                <div id="qr-box"><div id="qrcode"></div></div>
            </div>

            <div class="card" style="margin-top: 1.2rem;">
                <h3>Hubungkan Manual</h3>
                <div class="text-send-area" style="margin-bottom: 0;">
                    <input type="text" id="peer-id-input" class="text-input" placeholder="Masukkan 4 digit ID teman..." inputmode="numeric" pattern="[0-9]*" maxlength="4">
                    <button class="btn-send-text" onclick="connectManually()" style="background: var(--primary);"><i class="fa-solid fa-plug"></i></button>
                </div>
            </div>
            <div class="card" style="margin-top: 1.2rem; opacity: 0.8;" id="status-wait">
                <p style="font-size: 0.9rem;"><i class="fa-solid fa-spinner fa-spin"></i> Menunggu koneksi masuk...</p>
            </div>
        </div>

        <!-- AREA 2: TRANSFER FILE -->
        <div class="card" id="transfer-area">
            <div class="status-badge"><i class="fa-solid fa-file-shield"></i> Mode Transfer Berkas</div>
            <div class="file-upload-wrapper" id="drop-zone">
                <div class="file-upload-ui" id="drop-ui">
                    <i class="fa-solid fa-cloud-arrow-up"></i><span>Ketuk atau Seret File ke Sini</span>
                </div>
                <input type="file" id="file-input" multiple>
            </div>
            <div class="file-list" id="file-list"></div>
            <div class="btn-group">
                <button class="btn btn-primary" id="send-btn" disabled><i class="fa-solid fa-file-export"></i> Kirim File</button>
                <button class="btn btn-danger" id="cancel-btn"><i class="fa-solid fa-stop"></i> Batal</button>
            </div>
            <div class="progress-container" id="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
            <div class="stats-area" id="stats-area">
                <span id="progress-text">0%</span><span id="speed-text">0 MB/s</span><span id="eta-text">--:--</span>
            </div>
            <div class="log-area">
                <h4>Riwayat Berkas Sesi Ini:</h4>
                <ul class="log-list" id="transfer-log"><li style="opacity: 0.6; font-style: italic;" id="empty-log">Belum ada berkas terkirim/diterima.</li></ul>
            </div>
        </div>

        <!-- AREA 3: OBROLAN -->
        <div id="chat-area">
            <div class="chat-main-container">
                <div class="chat-box-area" id="chat-box"></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" class="text-input" placeholder="Tulis pesan rahasia...">
                    <button class="btn-send-text" id="btn-send-chat" style="padding: 0 1.2rem;"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <!-- AREA 4: GAME ONET 2.0 -->
        <div class="card" id="game-area">
            <div class="status-badge" style="background: rgba(139, 92, 246, 0.1); color: #8b5cf6;">
                <i class="fa-solid fa-gamepad"></i> Onet Multiplayer
            </div>
            
            <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; align-items: center;">
                <div style="display: flex; flex-direction: column; align-items: flex-start;">
                    <span id="game-score" style="font-weight: bold; color: var(--primary);">Skor: 0</span>
                    <span id="combo-text" style="color: #f59e0b; font-weight: 800; font-size: 0.9rem; height: 1.2rem; margin-top: 4px;"></span>
                </div>
                <div style="display: flex; gap: 8px;">
                    <select id="theme-select" class="text-input" style="padding: 6px; width: auto; border-radius: 8px;">
                        <option value="buah">🍎 Buah</option>
                        <option value="hewan">🐶 Hewan</option>
                        <option value="tech">💻 Tech</option>
                    </select>
                    <button class="btn-primary" onclick="startNewGame()" style="padding: 8px 12px; border-radius: 8px; border: none; cursor: pointer; color: white;">
                        <i class="fa-solid fa-play"></i> Mulai
                    </button>
                </div>
            </div>

            <div id="power-ups-area" style="display: flex; gap: 8px; margin-bottom: 1rem; justify-content: center;">
                <button class="btn-outline" onclick="usePowerUp('shuffle')" id="btn-shuffle" style="flex:1; padding: 6px; font-size: 0.8rem;"><i class="fa-solid fa-shuffle"></i> Acak (1)</button>
                <button class="btn-outline" onclick="usePowerUp('hint')" id="btn-hint" style="flex:1; padding: 6px; font-size: 0.8rem;"><i class="fa-solid fa-lightbulb"></i> Petunjuk (1)</button>
                <button class="btn-outline" onclick="usePowerUp('freeze')" id="btn-freeze" style="flex:1; padding: 6px; font-size: 0.8rem;"><i class="fa-solid fa-snowflake"></i> Bekukan (1)</button>
            </div>

            <div id="board-wrapper" style="position: relative;">
                <div class="onet-board" id="onet-board"></div>
                <svg id="path-svg" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; overflow: visible;"></svg>
            </div>
        </div>
    </div>

    <!-- NAVBAR BAWAH -->
    <nav class="bottom-nav" id="bottom-bar">
        <div class="nav-item active" id="nav-file" onclick="switchPage('file')">
            <i class="fa-solid fa-folder-open"></i><span>File</span>
        </div>
        <div class="nav-item" id="nav-chat" onclick="switchPage('chat')">
            <i class="fa-solid fa-comments"></i><span>Obrolan</span>
        </div>
        <div class="nav-item" id="nav-game" onclick="switchPage('game')">
            <i class="fa-solid fa-gamepad"></i><span>Game</span>
        </div>
    </nav>

    <div id="toast">Notifikasi</div>
    <script src="app.js"></script>
</body>
</html>
